apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudtask-api-hpa
  namespace: cloudtask
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudtask-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
