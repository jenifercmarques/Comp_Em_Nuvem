apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudtask-api-alb
  namespace: cloudtask
  annotations:
    kubernetes.io/ingress.class: alb
    # Decisao: ssl-redirect no ALB, nao no app.
    # Impacto: redirect em um unico lugar, app simples.
    # Risco se ignorar: app redirecionando + probe HTTP interno = loop/unhealthy.
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # Decisao: certificado no ACM (gratis e auto-renova).
    # Risco se ignorar: certificado manual expira e derruba HTTPS.
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/REPLACE_ME
spec:
  rules:
    - host: api.seu-dominio.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudtask-api
                port:
                  number: 80
