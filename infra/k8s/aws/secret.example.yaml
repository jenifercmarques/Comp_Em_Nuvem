apiVersion: v1
kind: Secret
metadata:
  name: cloudtask-secrets
  namespace: cloudtask
type: Opaque
stringData:
  # Preencha com valores reais fora do versionamento.
  DATABASE_URL: "postgresql+psycopg2://cloudtask:trocar@SEU_HOST:5432/cloudtask"
  SECRET_KEY: "trocar-por-valor-seguro"
  # Opcional para modo S3
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "cloudtask-ai-saas-uploads"
